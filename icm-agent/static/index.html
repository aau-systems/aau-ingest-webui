<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICM Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.agent {
            align-items: flex-start;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.agent .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
        }
        
        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: scale(1.05);
        }
        
        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 20px;
            font-style: italic;
            color: #999;
            background: white;
            margin: 0 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .model-selector {
            padding: 10px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .model-selector label {
            font-size: 14px;
            color: #666;
        }
        
        .model-selector select {
            padding: 5px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px 20px;
            margin: 10px 20px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* Loading animation */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>ICM Chat Interface</h1>
            <p>Intelligent Content Management Assistant</p>
        </div>
        
        <div class="model-selector">
            <label for="model-select">Model:</label>
            <select id="model-select">
                <option value="openai/gpt-4o">GPT-4o</option>
                <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
                <option value="anthropic/claude-3-sonnet">Claude 3 Sonnet</option>
                <option value="google/gemini-pro">Gemini Pro</option>
            </select>
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="typing-indicator" id="typing-indicator">
            ICM Agent is typing...
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message agent">
                <div class="message-bubble">
                    Hello! I'm your ICM Assistant. How can I help you analyze documents or manage content today?
                </div>
                <div class="message-time">Now</div>
            </div>
        </div>
        
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        class ICMChat {
            constructor() {
                this.conversationId = null;
                this.isStreaming = false;
                this.setupEventListeners();
                this.loadModels();
            }

            setupEventListeners() {
                const input = document.getElementById('message-input');
                const button = document.getElementById('send-button');

                button.addEventListener('click', () => this.sendMessage());
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.sendMessage();
                    }
                });
            }

            async loadModels() {
                try {
                    const response = await fetch('/api/models');
                    if (response.ok) {
                        const data = await response.json();
                        const select = document.getElementById('model-select');
                        select.innerHTML = '';
                        data.models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model.id;
                            option.textContent = model.name;
                            select.appendChild(option);
                        });
                    }
                } catch (error) {
                    console.warn('Could not load models:', error);
                }
            }

            async sendMessage() {
                const input = document.getElementById('message-input');
                const message = input.value.trim();
                
                if (!message || this.isStreaming) return;

                this.hideError();
                this.addUserMessage(message);
                input.value = '';
                this.setLoading(true);

                try {
                    await this.streamMessage(message);
                } catch (error) {
                    this.showError('Failed to send message: ' + error.message);
                    this.setLoading(false);
                }
            }

            addUserMessage(message) {
                const messagesContainer = document.getElementById('chat-messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                messageDiv.innerHTML = `
                    <div class="message-bubble">${this.escapeHtml(message)}</div>
                    <div class="message-time">${time}</div>
                `;
                
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            async streamMessage(message) {
                const model = document.getElementById('model-select').value;
                const responseDiv = this.addAgentMessage();
                this.isStreaming = true;

                try {
                    const response = await fetch('/api/chat/stream', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: message,
                            conversation_id: this.conversationId,
                            model: model
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = JSON.parse(line.substring(6));
                                this.handleStreamData(data, responseDiv);
                            }
                        }
                    }

                } catch (error) {
                    console.error('Stream error:', error);
                    this.showError('Failed to receive response from ICM Agent');
                } finally {
                    this.isStreaming = false;
                    this.setLoading(false);
                    this.hideTypingIndicator();
                }
            }

            handleStreamData(data, responseDiv) {
                switch (data.type) {
                    case 'connected':
                        this.conversationId = data.conversation_id;
                        this.showTypingIndicator();
                        break;
                    case 'chunk':
                        const contentDiv = responseDiv.querySelector('.message-bubble');
                        contentDiv.textContent += data.content;
                        this.scrollToBottom();
                        break;
                    case 'complete':
                        this.conversationId = data.conversation_id;
                        this.updateTimestamp(responseDiv, data.timestamp);
                        this.scrollToBottom();
                        break;
                    case 'error':
                        this.showError('Agent error: ' + data.error);
                        break;
                }
            }

            addAgentMessage() {
                const messagesContainer = document.getElementById('chat-messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message agent loading';
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                messageDiv.innerHTML = `
                    <div class="message-bubble"></div>
                    <div class="message-time">${time}</div>
                `;
                
                messagesContainer.appendChild(messageDiv);
                return messageDiv;
            }

            updateTimestamp(messageDiv, timestamp) {
                const time = new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const timeDiv = messageDiv.querySelector('.message-time');
                timeDiv.textContent = time;
                messageDiv.classList.remove('loading');
            }

            scrollToBottom() {
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            showTypingIndicator() {
                document.getElementById('typing-indicator').classList.add('active');
            }

            hideTypingIndicator() {
                document.getElementById('typing-indicator').classList.remove('active');
            }

            setLoading(isLoading) {
                const button = document.getElementById('send-button');
                button.disabled = isLoading;
                button.textContent = isLoading ? 'Sending...' : 'Send';
            }

            showError(message) {
                const errorDiv = document.getElementById('error-message');
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                setTimeout(() => this.hideError(), 5000);
            }

            hideError() {
                const errorDiv = document.getElementById('error-message');
                errorDiv.classList.remove('show');
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the chat when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ICMChat();
        });
    </script>
</body>
</html>
